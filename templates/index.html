<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Sort & Search</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>🔍 Sistema de Búsqueda</h1>

        <form method="POST">

            <input
                type="text"
                name="password"
                placeholder="Ingrese contraseña"
                maxlength="4"
                required
            >

            <button type="submit">
                Buscar
            </button>

        </form>

        {% if resultado %}

            <div class="resultado">

                <p>{{ resultado }}</p>

            </div>

        {% endif %}

    </div>

</body>

</html>
